        type: Website
      - url: https://www.cfindustries.com/products
        type: Products
    description: >-
      CF Industries exchanges orders, shipments, and invoices with
      distributors, rail carriers, and industrial customers through
      traditional EDI transactions and private B2B integrations rather
      than public REST APIs. These connections support the company's
      global terminal and distribution network across North America, the
      United Kingdom, and export markets.
