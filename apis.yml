description: >-
  CF Industries Holdings is a Fortune 500 American manufacturer and
  distributor of nitrogen-based fertilizers (ammonia, urea, ammonium
  nitrate, UAN) and clean-energy products serving agricultural and
  industrial customers worldwide. CF operates one of the largest global
  ammonia production networks and is scaling clean (blue and green)
  ammonia for low-carbon energy. CF does not publish a public developer
  API program; programmatic data access is limited to investor-relations
  SEC filings feeds, press/news RSS, and partner EDI/B2B integrations
  with agricultural distributors, rail, terminal, and industrial customers.
