      investor presentations that are accessible programmatically through
      SEC EDGAR filings feeds and the corporate newsroom RSS.
  - aid: cf-industries-holdings:cf-edi-b2b
    name: CF Industries EDI / B2B Supply Chain
    tags:
      - B2B
